<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stimker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 20px 16px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 32px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Grid galeri */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        /* Kartu gambar */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        /* Wrapper gambar agar konsisten */
        .image-wrapper {
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            cursor: pointer;
            border-bottom: 1px solid #eef2ff;
        }

        .image-wrapper img {
            max-width: 100%;
            height: 240px;
            object-fit: contain;
            transition: transform 0.2s;
            border-radius: 12px;
        }

        .image-wrapper img:active {
            transform: scale(0.98);
        }

        /* Info & Tombol */
        .card-info {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #ffffff;
        }

        .btn-download {
            background: #2a5298;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-download:active {
            transform: scale(0.96);
        }

        .btn-download:hover {
            background: #1e3c72;
        }

        .file-name {
            font-size: 0.7rem;
            color: #475569;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 30px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 140px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.8rem;
            color: #5b6e8c;
            border-top: 1px solid #e2e8f0;
            margin-top: 20px;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .gallery {
                gap: 16px;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
            .image-wrapper img {
                height: 200px;
            }
            .card-info {
                padding: 12px;
            }
            .btn-download {
                padding: 8px 16px;
                font-size: 0.75rem;
            }
        }

        /* Sembunyikan tombol jika JS tidak perlu, tapi tetap rapi */
        .btn-download i {
            font-style: normal;
            font-weight: bold;
        }

        /* Notifikasi */
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🖼️ STIMKER</h1>
        <p>| Klik gambar untuk memperbesar • Tombol unduh untuk menyimpan</p>
    </div>

    <div class="gallery" id="galleryContainer">
        <!-- Galeri akan diisi oleh JavaScript -->
        <div style="text-align: center; grid-column: 1/-1; padding: 40px;">Memuat gambar...</div>
    </div>

    <div class="footer">        
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // Daftar URL gambar dari soal
    const imageUrls = [
        "https://cdn.postimage.me/2026/05/20/1000394851.png",
        "https://cdn.postimage.me/2026/05/20/1000394848.png",
        "https://cdn.postimage.me/2026/05/20/1000394849.png",
        "https://cdn.postimage.me/2026/05/20/1000394846.png",
        "https://cdn.postimage.me/2026/05/20/1000394847.png",
        "https://cdn.postimage.me/2026/05/20/1000394852.png",
        "https://cdn.postimage.me/2026/05/20/1000393253.jpg",
        "https://cdn.postimage.me/2026/05/20/1000393321.png"
    ];

    // Fungsi untuk mengambil nama file dari URL (opsional)
    function getFileName(url) {
        try {
            const parts = url.split('/');
            let filename = parts.pop() || 'gambar';
            // hapus parameter query jika ada
            filename = filename.split('?')[0];
            if (!filename.includes('.')) filename += '.png';
            return filename;
        } catch(e) {
            return 'gambar_tugas';
        }
    }

    // Tampilkan notifikasi singkat
    function showToast(message, duration = 1500) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }

    // Fungsi unduh: karena gambar cross-origin, kita buka di tab baru dengan instruksi simpan
    // Ini paling aman dan berfungsi di semua perangkat (Android: tekan lama, Desktop: klik kanan)
    function handleDownload(url, event) {
        event.stopPropagation(); // mencegah klik pada kartu
        // Buka URL gambar langsung di tab baru
        window.open(url, '_blank');
        // Notifikasi kecil
        showToast('✅ Gambar dibuka di tab baru. Tekan lama / klik kanan → Simpan gambar', 2000);
    }

    // Fungsi untuk membuat kartu galeri
    function buildGallery() {
        const container = document.getElementById('galleryContainer');
        container.innerHTML = ''; // kosongkan loading

        imageUrls.forEach((url, index) => {
            const card = document.createElement('div');
            card.className = 'card';

            // Wrapper gambar + klik untuk preview (buka di tab baru juga)
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';
            const img = document.createElement('img');
            img.src = url;
            img.alt = `Gambar Stimker ${index+1}`;
            img.loading = 'lazy';
            // Klik gambar -> buka di tab baru (mirip download)
            imgWrapper.addEventListener('click', (e) => {
                e.stopPropagation();
                window.open(url, '_blank');
                showToast('🔍 Membuka gambar ukuran penuh', 1000);
            });
            imgWrapper.appendChild(img);

            // Bagian info: nama file dan tombol unduh
            const infoDiv = document.createElement('div');
            infoDiv.className = 'card-info';

            const fileNameSpan = document.createElement('span');
            fileNameSpan.className = 'file-name';
            fileNameSpan.title = getFileName(url);
            fileNameSpan.textContent = getFileName(url).substring(0, 20) + (getFileName(url).length > 20 ? '…' : '');

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-download';
            downloadBtn.innerHTML = '📥 Unduh';
            downloadBtn.addEventListener('click', (event) => handleDownload(url, event));

            infoDiv.appendChild(fileNameSpan);
            infoDiv.appendChild(downloadBtn);

            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            container.appendChild(card);
        });
    }

    // Eksekusi saat halaman siap
    buildGallery();
</script>
</body>
</html>
